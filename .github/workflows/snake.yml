name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"  # runs every 12 hours
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Generate snake animation
        uses: Platane/snk@v3
        with:
          github_user_name: manavmax
          outputs: |
                    dist/github-snake.svg?color_snake=blue&color_dots=#161b22,#0e4429,#006d32,#26a641,#39d353
                    dist/github-snake-dark.svg?palette=github-dark&color_snake=cyan

      - name: Push to branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
